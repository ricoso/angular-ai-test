name: Board Sync — New Requirements → main

on:
  push:
    branches:
      - 'req/**'
      - 'feat/**'
      - 'REQ-*'
    paths:
      - 'docs/requirements/REQUIREMENTS.md'
      - 'docs/requirements/REQ-*/requirement.md'

jobs:
  sync-new-requirements:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          path: feature

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: main

      - name: Sync new requirements to main
        run: |
          FEATURE_FILE="feature/docs/requirements/REQUIREMENTS.md"
          MAIN_FILE="main/docs/requirements/REQUIREMENTS.md"

          if [ ! -f "$FEATURE_FILE" ] || [ ! -f "$MAIN_FILE" ]; then
            echo "REQUIREMENTS.md not found in both branches"
            exit 0
          fi

          BRANCH="${{ github.ref_name }}"
          REQ_ID=$(echo "$BRANCH" | grep -oP 'REQ-\d{3}' | head -1)

          if [ -z "$REQ_ID" ]; then
            echo "No REQ-ID found in branch: $BRANCH"
            exit 0
          fi

          echo "Checking ${REQ_ID} from branch ${BRANCH}..."

          # Check if REQ already exists on main
          if grep -q "| ${REQ_ID} " "$MAIN_FILE"; then
            echo "${REQ_ID} already exists on main — updating status to In Progress"
            cd main

            # Only update if not already In Review or Implemented
            CURRENT=$(grep "| ${REQ_ID} " docs/requirements/REQUIREMENTS.md | grep -oP '(Draft|In Review|Approved|In Progress|Implemented|Rejected)')
            if [ "$CURRENT" = "Draft" ] || [ "$CURRENT" = "Approved" ]; then
              sed -i -E "s/^(\| ${REQ_ID} \|[^|]*\|)[^|]*/\1 🚧 In Progress /" docs/requirements/REQUIREMENTS.md
              . ../.github/scripts/update-stats.sh docs/requirements/REQUIREMENTS.md
            else
              echo "Status is '$CURRENT' — no update needed"
              exit 0
            fi
          else
            echo "${REQ_ID} is NEW — adding to main"
            cd main

            # Extract the new row from feature branch
            NEW_ROW=$(grep "| ${REQ_ID} " "../$FEATURE_FILE")

            if [ -z "$NEW_ROW" ]; then
              echo "Could not find ${REQ_ID} row in feature REQUIREMENTS.md"
              exit 0
            fi

            # Set status to In Progress on main
            NEW_ROW=$(echo "$NEW_ROW" | sed -E "s/\|[^|]*(📝|🔍|✅|🚧|✔️|❌)[^|]*\|/| 🚧 In Progress |/")

            # Find insertion point (end of table)
            TABLE_END=$(grep -n '^|' docs/requirements/REQUIREMENTS.md | tail -1 | cut -d: -f1)

            if [ -n "$TABLE_END" ]; then
              sed -i "${TABLE_END}a\\${NEW_ROW}" docs/requirements/REQUIREMENTS.md
              . ../.github/scripts/update-stats.sh docs/requirements/REQUIREMENTS.md
            fi
          fi

          # Also sync requirement.md folder if it exists
          FEATURE_REQ_DIR=$(find ../feature/docs/requirements/ -maxdepth 1 -type d -name "${REQ_ID}*" | head -1)
          if [ -n "$FEATURE_REQ_DIR" ]; then
            FOLDER_NAME=$(basename "$FEATURE_REQ_DIR")
            TARGET_DIR="docs/requirements/${FOLDER_NAME}"
            if [ ! -d "$TARGET_DIR" ]; then
              echo "Syncing requirement folder: ${FOLDER_NAME}"
              cp -r "$FEATURE_REQ_DIR" "$TARGET_DIR"
            fi
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/requirements/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs(board): sync ${REQ_ID} from ${BRANCH} → main"
          git push origin main
