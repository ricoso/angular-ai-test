name: Board Sync — Auto-Update Requirement Status

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
    branches: [main]

jobs:
  # --- PR opened/ready → In Review ---
  pr-opened:
    if: >
      (github.event.action == 'opened' ||
       github.event.action == 'reopened' ||
       github.event.action == 'ready_for_review') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract REQ-ID
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REQ_ID=$(echo "$BRANCH" | grep -oP 'REQ-\d{3}' | head -1)
          if [ -z "$REQ_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "req_id=$REQ_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update status → In Review
        if: steps.extract.outputs.skip == 'false'
        run: |
          REQ_ID="${{ steps.extract.outputs.req_id }}"
          FILE="docs/requirements/REQUIREMENTS.md"
          [ ! -f "$FILE" ] && exit 0

          sed -i -E "s/^(\| ${REQ_ID} \|[^|]*\|)[^|]*/\1 🔍 In Review /" "$FILE"
          . .github/scripts/update-stats.sh "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git diff --cached --quiet && exit 0
          git commit -m "docs(board): ${REQ_ID} → In Review (PR #${{ github.event.pull_request.number }})"
          git push origin main

  # --- PR merged → Implemented ---
  pr-merged:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract REQ-ID
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REQ_ID=$(echo "$BRANCH" | grep -oP 'REQ-\d{3}' | head -1)
          if [ -z "$REQ_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "req_id=$REQ_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update status → Implemented
        if: steps.extract.outputs.skip == 'false'
        run: |
          REQ_ID="${{ steps.extract.outputs.req_id }}"
          FILE="docs/requirements/REQUIREMENTS.md"
          [ ! -f "$FILE" ] && exit 0

          sed -i -E "s/^(\| ${REQ_ID} \|[^|]*\|)[^|]*/\1 ✔️ Implemented /" "$FILE"
          . .github/scripts/update-stats.sh "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git diff --cached --quiet && exit 0
          git commit -m "docs(board): ${REQ_ID} → Implemented (PR #${{ github.event.pull_request.number }} merged)"
          git push origin main

  # --- PR closed without merge → back to In Progress ---
  pr-closed-no-merge:
    if: github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract REQ-ID
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REQ_ID=$(echo "$BRANCH" | grep -oP 'REQ-\d{3}' | head -1)
          if [ -z "$REQ_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "req_id=$REQ_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update status → In Progress
        if: steps.extract.outputs.skip == 'false'
        run: |
          REQ_ID="${{ steps.extract.outputs.req_id }}"
          FILE="docs/requirements/REQUIREMENTS.md"
          [ ! -f "$FILE" ] && exit 0

          sed -i -E "s/^(\| ${REQ_ID} \|[^|]*\|)[^|]*/\1 🚧 In Progress /" "$FILE"
          . .github/scripts/update-stats.sh "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git diff --cached --quiet && exit 0
          git commit -m "docs(board): ${REQ_ID} → In Progress (PR #${{ github.event.pull_request.number }} closed)"
          git push origin main
