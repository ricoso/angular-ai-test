<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills & Commands — Requirements Board</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <div class="d-flex align-items-center gap-3">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-kanban"></i> Requirements Board
      </span>
      <a href="/" class="nav-link-pages">Board</a>
      <a href="/skills.html" class="nav-link-pages active">Skills & Commands</a>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <small class="text-muted" id="pageStatus"></small>
    </div>
  </nav>

  <!-- Skills Container -->
  <div class="skills-container">
    <!-- Tabs -->
    <div class="skills-tabs">
      <ul class="nav nav-tabs mb-0" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-tab="workflows" type="button">
            <i class="bi bi-diagram-3"></i> Workflows
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="skills" type="button">
            <i class="bi bi-lightbulb"></i> Skills
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="commands" type="button">
            <i class="bi bi-terminal"></i> Commands
          </button>
        </li>
      </ul>
    </div>

    <!-- Master-Detail -->
    <div class="master-detail-layout">
      <!-- Master List -->
      <div class="master-list">
        <div class="master-list-search">
          <div class="d-flex gap-2 align-items-center">
            <input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Filter..." style="flex:1">
            <button class="btn btn-primary btn-sm" id="newWorkflowBtn" title="New Workflow">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>
        </div>
        <div class="item-list" id="itemList"></div>
      </div>

      <!-- Detail Pane -->
      <div class="detail-pane">
        <div id="detailEmpty" class="detail-pane-empty">
          <span><i class="bi bi-arrow-left-circle"></i> Select an item from the list</span>
        </div>
        <div id="detailEditor" style="display:none">
          <div class="detail-pane-header">
            <span class="filename" id="detailFilename"></span>
            <div class="d-flex align-items-center gap-2">
              <small class="text-muted" id="saveStatus"></small>
              <button class="btn btn-primary btn-sm" id="saveBtn">
                <i class="bi bi-floppy"></i> Save
              </button>
              <button class="btn btn-outline-primary btn-sm" id="chatBtn">
                <i class="bi bi-chat-dots"></i> AI Chat
              </button>
            </div>
          </div>
          <textarea class="form-control editor-textarea" id="editorTextarea"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Sidebar (reused pattern from board) -->
  <div id="chatSidebar" class="chat-sidebar" style="display:none">
    <div class="chat-sidebar-header">
      <span><i class="bi bi-chat-dots"></i> AI Chat — <span id="chatSidebarTitle"></span></span>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-light" id="chatClearBtn" title="Clear"><i class="bi bi-trash3"></i></button>
        <button class="btn btn-sm btn-outline-light" id="chatCloseBtn"><i class="bi bi-x-lg"></i></button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg chat-system">
        Frag mich etwas zu diesem Skill, Command oder Workflow.
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="form-control" id="chatInput" rows="2" placeholder="z.B. 'Erklaere diesen Abschnitt...'"></textarea>
      <button class="btn-mic" id="chatMicBtn" title="Spracheingabe (Mikrofon)">
        <i class="bi bi-mic"></i>
      </button>
      <button class="btn btn-primary" id="chatSendBtn">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="statusToast" class="toast" role="alert">
      <div class="toast-body" id="toastBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/skills.js"></script>
</body>
</html>
