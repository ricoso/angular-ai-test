<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills & Commands — LHIND Requirements Board</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>

  <!-- LHIND Header -->
  <header class="lhind-header">
    <div class="lhind-header-left">
      <div class="lhind-logo">
        <svg viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="20" font-family="Arial, sans-serif" font-weight="800" font-size="18" fill="#ffffff" letter-spacing="0.5">LHIND</text>
        </svg>
        <span class="lhind-logo-divider"></span>
        <span class="lhind-logo-subtitle">Requirements Board</span>
      </div>
      <nav class="d-flex gap-2">
        <a href="/" class="lhind-nav-link">Board</a>
        <a href="/skills.html" class="lhind-nav-link active">Skills & Commands</a>
      </nav>
    </div>
    <div class="lhind-header-right">
      <small class="text-muted" id="pageStatus" style="color: rgba(255,255,255,0.6) !important; font-size: 0.75rem;"></small>
    </div>
  </header>

  <!-- Skills Container -->
  <div class="skills-container">
    <!-- Tabs -->
    <div class="skills-tabs">
      <ul class="nav nav-tabs mb-0" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" data-tab="workflows" type="button">
            <i class="bi bi-diagram-3"></i> Workflows
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="skills" type="button">
            <i class="bi bi-lightbulb"></i> Skills
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="commands" type="button">
            <i class="bi bi-terminal"></i> Commands
          </button>
        </li>
      </ul>
    </div>

    <!-- Master-Detail -->
    <div class="master-detail-layout">
      <!-- Master List -->
      <div class="master-list">
        <div class="master-list-search">
          <input type="text" class="maui-input maui-input-sm" id="searchInput" placeholder="Filter...">
          <button class="maui-btn maui-btn-primary maui-btn-sm maui-btn-icon" id="newWorkflowBtn" title="New Workflow">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
        <div class="item-list" id="itemList"></div>
      </div>

      <!-- Detail Pane -->
      <div class="detail-pane">
        <div id="detailEmpty" class="detail-pane-empty">
          <span><i class="bi bi-arrow-left-circle"></i> Select an item from the list</span>
        </div>
        <div id="detailEditor" style="display:none">
          <div class="detail-pane-header">
            <span class="filename" id="detailFilename"></span>
            <div class="d-flex gap-2 align-items-center">
              <small class="text-muted" id="saveStatus"></small>
              <button class="maui-btn maui-btn-primary maui-btn-sm" id="saveBtn">
                <i class="bi bi-floppy"></i> Save
              </button>
              <button class="maui-btn maui-btn-outline maui-btn-sm" id="chatBtn">
                <i class="bi bi-chat-dots"></i> AI Chat
              </button>
              <button class="maui-btn maui-btn-outline-danger maui-btn-sm maui-btn-icon" id="deleteItemBtn" title="Delete">
                <i class="bi bi-trash3"></i>
              </button>
            </div>
          </div>
          <textarea class="editor-textarea" id="editorTextarea"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Sidebar -->
  <div id="chatSidebar" class="chat-sidebar" style="display:none">
    <div class="chat-sidebar-header">
      <span><i class="bi bi-chat-dots"></i> AI Chat — <span id="chatSidebarTitle"></span></span>
      <div class="d-flex gap-2">
        <button class="maui-btn maui-btn-outline-light maui-btn-icon maui-btn-sm" id="chatClearBtn" title="Clear"><i class="bi bi-trash3"></i></button>
        <button class="maui-btn maui-btn-outline-light maui-btn-icon maui-btn-sm" id="chatCloseBtn"><i class="bi bi-x-lg"></i></button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg chat-system">
        Frag mich etwas zu diesem Skill, Command oder Workflow.
      </div>
    </div>
    <div class="chat-input-area">
      <textarea id="chatInput" rows="2" placeholder="z.B. 'Erklaere diesen Abschnitt...'"></textarea>
      <button class="btn-mic" id="chatMicBtn" title="Spracheingabe (Mikrofon)">
        <i class="bi bi-mic"></i>
      </button>
      <button class="maui-btn maui-btn-primary" id="chatSendBtn">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="statusToast" class="toast" role="alert">
      <div class="toast-body" id="toastBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/skills.js"></script>
</body>
</html>
