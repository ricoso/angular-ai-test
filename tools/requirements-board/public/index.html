<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Requirements Board</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet">
</head>
<body>

  <!-- Toolbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">
      <i class="bi bi-kanban"></i> Requirements Board
    </span>
    <div class="d-flex gap-2">
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createModal">
        <i class="bi bi-plus-lg"></i> New Requirement
      </button>
      <button class="btn btn-outline-light btn-sm" id="refreshBtn">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
    </div>
  </nav>

  <!-- Board -->
  <div class="board-container">
    <div class="row g-3 h-100">
      <div class="col-3 d-flex flex-column h-100">
        <div class="column-header bg-secondary text-white">
          <span>To-Do</span>
          <span class="badge bg-light text-dark" id="count-todo">0</span>
        </div>
        <div class="column-body" id="col-todo" data-column="todo"></div>
      </div>
      <div class="col-3 d-flex flex-column h-100">
        <div class="column-header bg-primary text-white">
          <span>In Progress</span>
          <span class="badge bg-light text-dark" id="count-in-progress">0</span>
        </div>
        <div class="column-body" id="col-in-progress" data-column="in-progress"></div>
      </div>
      <div class="col-3 d-flex flex-column h-100">
        <div class="column-header bg-warning text-dark">
          <span>In Review</span>
          <span class="badge bg-dark text-white" id="count-in-review">0</span>
        </div>
        <div class="column-body" id="col-in-review" data-column="in-review"></div>
      </div>
      <div class="col-3 d-flex flex-column h-100">
        <div class="column-header bg-success text-white">
          <span>Done</span>
          <span class="badge bg-light text-dark" id="count-done">0</span>
        </div>
        <div class="column-body" id="col-done" data-column="done"></div>
      </div>
    </div>
  </div>

  <!-- Create Modal -->
  <div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">New Requirement</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="createForm">
            <div class="mb-3">
              <label for="createTitle" class="form-label">Title *</label>
              <input type="text" class="form-control" id="createTitle" required>
            </div>
            <div class="mb-3">
              <label for="createDescription" class="form-label">Description *</label>
              <textarea class="form-control" id="createDescription" rows="16" required></textarea>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label for="createPriority" class="form-label">Priority</label>
                <select class="form-select" id="createPriority">
                  <option value="High">High</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="Low">Low</option>
                </select>
              </div>
              <div class="col-6 mb-3">
                <label for="createLabel" class="form-label">Label</label>
                <select class="form-select" id="createLabel">
                  <option value="User Story" selected>User Story</option>
                  <option value="Technical Story">Technical Story</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label for="createTags" class="form-label">Tags (comma-separated)</label>
              <input type="text" class="form-control" id="createTags" placeholder="e.g. auth, ux, backend">
            </div>
            <div class="mb-3">
              <label for="createFiles" class="form-label">Mockups / Attachments</label>
              <input type="file" class="form-control" id="createFiles" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.svg,.pdf,.html">
              <div class="form-text">Images, PDFs, or HTML mockups (max 10 MB each)</div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="createSubmitBtn">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" data-bs-focus="false">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-pencil-square"></i> <span id="editReqId"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Tab Navigation -->
          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item">
              <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabOverview" type="button">Overview</button>
            </li>
            <li class="nav-item">
              <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabRequirement" type="button">
                <i class="bi bi-file-earmark-text"></i> requirement.md
              </button>
            </li>
            <li class="nav-item" id="tabAttachmentsNav" style="display:none">
              <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabAttachments" type="button">
                <i class="bi bi-paperclip"></i> Attachments
              </button>
            </li>
          </ul>

          <div class="tab-content">
            <!-- Tab: Overview -->
            <div class="tab-pane fade show active" id="tabOverview">
              <div class="row">
                <div class="col-6 mb-3">
                  <label for="editTitle" class="form-label">Title</label>
                  <input type="text" class="form-control" id="editTitle" readonly>
                </div>
                <div class="col-3 mb-3">
                  <label class="form-label">Priority</label>
                  <input type="text" class="form-control" id="editPriority" readonly>
                </div>
                <div class="col-3 mb-3">
                  <label class="form-label">Status</label>
                  <input type="text" class="form-control" id="editStatus" readonly>
                </div>
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Label</label>
                  <input type="text" class="form-control" id="editLabel" readonly>
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">Dependencies</label>
                  <input type="text" class="form-control" id="editDeps" readonly>
                </div>
              </div>
              <div class="mb-3">
                <label for="editDescription" class="form-label">Description</label>
                <textarea class="form-control" id="editDescription" rows="10" readonly></textarea>
              </div>
            </div>

            <!-- Tab: requirement.md editor + chat -->
            <div class="tab-pane fade" id="tabRequirement">
              <div id="reqContentLoading" class="text-center py-4 text-muted">
                <div class="spinner-border spinner-border-sm"></div> Loading...
              </div>
              <div id="reqContentEmpty" class="text-center py-4 text-muted" style="display:none">
                <i class="bi bi-file-earmark-x"></i> No requirement.md found. Create one via the board workflow.
              </div>
              <div id="reqContentEditor" style="display:none">
                <div class="req-editor-full">
                  <div class="pane-header">
                    <span><i class="bi bi-file-earmark-code"></i> requirement.md</span>
                    <div class="d-flex align-items-center gap-2">
                      <small class="text-muted" id="reqSaveStatus"></small>
                      <button class="btn btn-primary btn-sm" id="saveReqContentBtn">
                        <i class="bi bi-floppy"></i> Save
                      </button>
                      <button class="btn btn-outline-primary btn-sm" id="openChatSidebarBtn">
                        <i class="bi bi-chat-dots"></i> AI Chat
                      </button>
                    </div>
                  </div>
                  <textarea class="form-control font-monospace" id="editReqContent"></textarea>
                </div>
              </div>
            </div>

            <!-- Tab: Attachments -->
            <div class="tab-pane fade" id="tabAttachments">
              <div id="editAttachments" class="d-flex flex-wrap gap-2 mb-3"></div>
              <div id="editPreviewSection" style="display:none">
                <label class="form-label"><i class="bi bi-image"></i> Mockup Preview</label>
                <div id="editPreview"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Sidebar -->
  <div id="chatSidebar" class="chat-sidebar" style="display:none">
    <div class="chat-sidebar-header">
      <span><i class="bi bi-chat-dots"></i> AI Chat — <span id="chatSidebarReqId"></span></span>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-light" id="chatSidebarClearBtn" title="Clear"><i class="bi bi-trash3"></i></button>
        <button class="btn btn-sm btn-outline-light" id="chatSidebarCloseBtn"><i class="bi bi-x-lg"></i></button>
      </div>
    </div>
    <div class="chat-messages" id="chatSidebarMessages">
      <div class="chat-msg chat-system">
        Frag mich etwas zum Requirement oder sag mir was ich ändern soll.
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="form-control" id="chatSidebarInput" rows="2" placeholder="z.B. 'Ändere die Acceptance Criteria zu...'"></textarea>
      <button class="btn btn-primary" id="chatSidebarSendBtn">
        <i class="bi bi-send"></i>
      </button>
    </div>
  </div>

  <!-- Log Panel (slide-up) -->
  <div id="logPanel" class="log-panel" style="display:none">
    <div class="log-panel-header d-flex justify-content-between align-items-center px-3 py-2">
      <span><i class="bi bi-terminal"></i> Workflow Log — <span id="logReqId"></span></span>
      <div class="d-flex gap-2 align-items-center">
        <span id="logSpinner" class="spinner-border spinner-border-sm text-light" style="display:none"></span>
        <button class="btn btn-sm btn-outline-light" id="logCloseBtn"><i class="bi bi-x-lg"></i></button>
      </div>
    </div>
    <pre id="logOutput" class="log-panel-body"></pre>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="statusToast" class="toast" role="alert">
      <div class="toast-body" id="toastBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
