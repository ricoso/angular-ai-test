<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REQ-011 Serviceauswahl Erweitert - Mockup</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================================================
       CSS Custom Properties - Design System (from _variables.scss)
       ========================================================================= */
    :root {
      /* Brand Colors */
      --color-primary: #667eea;
      --color-primary-hover: #5a67d8;
      --color-secondary: #764ba2;
      --color-accent: #ed8936;

      /* Text Colors (WCAG AA) */
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #595959;
      --color-text-muted: #767676;
      --color-text-on-primary: #ffffff;
      --color-text-on-dark: #ffffff;

      /* Background Colors */
      --color-background-page: #f8f9fa;
      --color-background-surface: #ffffff;
      --color-background-hover: #f5f5f5;

      /* Border & Divider */
      --color-border: #e0e0e0;
      --color-divider: #eeeeee;

      /* Semantic Colors */
      --color-error: #c62828;
      --color-success: #2e7d32;
      --color-warning: #e65100;
      --color-info: #1565c0;

      /* Focus */
      --color-focus-ring: #005fcc;

      /* Shadows */
      --shadow-small: 0 0.0625em 0.125em rgba(0, 0, 0, 0.1);
      --shadow-medium: 0 0.25em 0.5em rgba(0, 0, 0, 0.1);
      --shadow-large: 0 0.5em 1em rgba(0, 0, 0, 0.15);

      /* Typography */
      --font-size-base: 1em;
      --font-size-xs: 0.875em;
      --font-size-sm: 1em;
      --font-size-md: 1.125em;
      --font-size-lg: 1.25em;
      --font-size-xl: 1.5em;
      --font-size-2xl: 2em;

      --line-height-tight: 1.25;
      --line-height-normal: 1.5;
      --line-height-relaxed: 1.75;

      /* Spacing */
      --spacing-xs: 0.25em;
      --spacing-sm: 0.5em;
      --spacing-md: 1em;
      --spacing-lg: 1.5em;
      --spacing-xl: 2em;

      /* Border Radius */
      --radius-sm: 0.25em;
      --radius-md: 0.5em;
      --radius-lg: 0.75em;
      --radius-xl: 1em;
      --radius-full: 50%;

      /* Touch Targets */
      --touch-target-min: 2.75em;
    }

    /* =========================================================================
       Reset & Base
       ========================================================================= */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: var(--line-height-normal);
      color: var(--color-text-primary);
      background-color: var(--color-background-page);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =========================================================================
       App Layout
       ========================================================================= */
    .app-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--color-background-page);
    }

    .app-main {
      flex: 1;
      padding: var(--spacing-md);
      width: 100%;
      max-width: 80em;
      margin: 0 auto;
    }

    @media (min-width: 48em) {
      .app-main {
        padding: var(--spacing-xl);
      }
    }

    /* =========================================================================
       Icon Framed (from _utilities.scss)
       ========================================================================= */
    .icon-framed {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5em;
      height: 2.5em;
      background: var(--color-background-surface);
      border: 0.0625em solid var(--color-border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-small);
    }

    .icon-framed--sm {
      width: 2em;
      height: 2em;
    }

    .icon-framed--primary {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    .icon-framed--lg {
      width: 3em;
      height: 3em;
    }

    .icon-framed--xl {
      width: 4em;
      height: 4em;
      border-radius: var(--radius-full);
    }

    /* =========================================================================
       Header (from header-container.component.scss)
       ========================================================================= */
    .header {
      background-color: var(--color-background-surface);
      border-bottom: 0.0625em solid var(--color-border);
      box-shadow: var(--shadow-small);
    }

    .header__content {
      display: flex;
      align-items: center;
      padding: var(--spacing-sm) var(--spacing-md);
      max-width: 80em;
      margin: 0 auto;
      min-height: 3.5em;
    }

    .header__logo-link {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      text-decoration: none;
      color: inherit;
      min-height: var(--touch-target-min);
      padding: var(--spacing-xs);
      border-radius: var(--radius-sm);
      transition: background-color 0.2s ease;
    }

    .header__logo-link:hover {
      background-color: var(--color-background-hover);
    }

    .header__logo-link:focus-visible {
      outline: 0.125em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .header__logo-container {
      width: 2.5em;
      height: 2.5em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header__logo-circle {
      width: 2.5em;
      height: 2.5em;
      border-radius: var(--radius-full);
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--font-size-sm);
      letter-spacing: 0.05em;
    }

    .header__company {
      display: flex;
      flex-direction: column;
      line-height: var(--line-height-tight);
    }

    .header__company-name {
      font-size: var(--font-size-md);
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .header__company-subtitle {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
    }

    .header__spacer {
      flex: 1;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .header__icon-button {
      background: none;
      border: none;
      cursor: pointer;
      min-width: var(--touch-target-min);
      min-height: var(--touch-target-min);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      position: relative;
      padding: 0;
      color: var(--color-text-primary);
    }

    .header__icon-button:hover {
      background-color: var(--color-background-hover);
    }

    .header__icon-button:focus-visible {
      outline: 0.125em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .cart-badge {
      position: absolute;
      top: 0.125em;
      right: -0.125em;
      background-color: var(--color-accent);
      color: var(--color-text-on-primary);
      font-size: 0.6875em;
      font-weight: 700;
      min-width: 1.25em;
      height: 1.25em;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0 0.25em;
    }

    /* Header responsive */
    @media (max-width: 47.9375em) {
      .header__company {
        display: none;
      }

      .header__content {
        padding: var(--spacing-xs) var(--spacing-sm);
      }
    }

    @media (min-width: 48em) and (max-width: 63.9375em) {
      .header__company-subtitle {
        display: none;
      }
    }

    @media (min-width: 64em) {
      .header__content {
        padding: var(--spacing-md) var(--spacing-lg);
      }

      .header__logo-container {
        width: 3em;
        height: 3em;
      }

      .header__logo-circle {
        width: 3em;
        height: 3em;
        font-size: var(--font-size-md);
      }
    }

    /* =========================================================================
       Service Selection
       ========================================================================= */
    .service-selection {
      max-width: 70em;
      margin: 0 auto;
      padding: var(--spacing-xl) var(--spacing-md);
      text-align: center;
    }

    .service-selection__title {
      font-size: var(--font-size-2xl);
      line-height: var(--line-height-tight);
      color: var(--color-text-primary);
      margin: 0 0 var(--spacing-sm);
      font-weight: 700;
    }

    .service-selection__subtitle {
      font-size: var(--font-size-md);
      line-height: var(--line-height-normal);
      color: var(--color-text-secondary);
      margin: 0 0 var(--spacing-xl);
    }

    .service-selection__grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-lg);
    }

    @media (min-width: 48em) {
      .service-selection__grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 64em) {
      .service-selection__grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* =========================================================================
       Service Card
       ========================================================================= */
    .service-card {
      position: relative;
      background-color: var(--color-background-surface);
      border: 0.125em solid var(--color-border);
      border-radius: var(--radius-lg);
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
      padding: var(--spacing-lg);
    }

    .service-card__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
      padding: 0;
    }

    .service-card__icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 4em;
      height: 4em;
      background: var(--color-background-surface);
      border: 0.0625em solid var(--color-border);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-small);
      color: var(--color-primary);
    }

    .service-card__icon-wrapper img {
      width: 3em;
      height: 3em;
      object-fit: contain;
      /* Einfärbung der schwarzen Icons in Primary-Blau (#667eea) */
      filter: invert(48%) sepia(79%) saturate(1564%) hue-rotate(212deg) brightness(97%) contrast(88%);
    }

    .service-card__title {
      font-size: var(--font-size-lg);
      font-weight: 600;
      color: var(--color-text-primary);
      margin: 0;
    }

    .service-card__description {
      font-size: var(--font-size-xs);
      line-height: var(--line-height-normal);
      color: var(--color-text-secondary);
      margin: 0;
    }

    .service-card__check {
      position: absolute;
      top: var(--spacing-sm);
      right: var(--spacing-sm);
      color: var(--color-primary);
      font-size: var(--font-size-xl);
      display: none;
    }

    /* =========================================================================
       CSS-Only Toggle: Hidden Checkboxes for Card Expand/Select

       Pattern for cards WITH options:
         <input type="checkbox" class="card-expand-toggle" id="expand-SERVICE">
         <div class="service-card service-card--expandable">
           <label for="expand-SERVICE" class="service-card__trigger">
             ...icon, title, description...
           </label>
           <div class="service-card__options">
             ...checkboxes...
             <label for="expand-SERVICE" class="btn btn--confirm">Bestätigen</label>
             <label for="expand-SERVICE" class="btn btn--deselect">Abwählen</label>
           </div>
         </div>

       Pattern for cards WITHOUT options (direct toggle):
         <input type="checkbox" class="card-toggle" id="toggle-SERVICE">
         <label class="service-card service-card--clickable" for="toggle-SERVICE">
           ...card content...
         </label>
       ========================================================================= */

    /* Visually hidden but accessible */
    .card-toggle,
    .card-expand-toggle {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* --- Direct toggle card (Bremsflüssigkeit) --- */
    .service-card--clickable {
      cursor: pointer;
      display: block;
    }

    .service-card--clickable:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-medium);
    }

    .card-toggle:focus-visible + .service-card--clickable {
      outline: 0.1875em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .card-toggle:checked + .service-card--clickable {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-medium);
    }

    .card-toggle:checked + .service-card--clickable .service-card__check {
      display: block;
    }

    /* --- Expandable card (cards with options) --- */
    .service-card--expandable {
      overflow: hidden;
    }

    .service-card__trigger {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
      padding: 0;
    }

    .service-card__trigger:hover {
      opacity: 0.9;
    }

    .service-card--expandable:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-medium);
    }

    /* Options area hidden by default */
    .service-card__options {
      display: none;
      width: 100%;
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 0.0625em solid var(--color-divider);
      text-align: left;
    }

    /* When expanded: show options */
    .card-expand-toggle:checked + .service-card--expandable .service-card__options {
      display: block;
    }

    /* Selected state when expanded */
    .card-expand-toggle:checked + .service-card--expandable {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-medium);
    }

    .card-expand-toggle:checked + .service-card--expandable .service-card__check {
      display: block;
    }

    /* Focus-visible transfer */
    .card-expand-toggle:focus-visible + .service-card--expandable {
      outline: 0.1875em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    /* Confirm/Deselect button toggle */
    .service-card__options .btn--deselect {
      display: none;
    }

    .service-card__options .btn--confirm {
      display: inline-flex;
    }

    .card-expand-toggle:checked + .service-card--expandable .service-card__options .btn--confirm {
      /* Keep confirm visible so user can collapse by clicking again */
    }

    /* =========================================================================
       Checkbox Options inside Cards
       ========================================================================= */
    .service-card__option-list {
      list-style: none;
      padding: 0;
      margin: 0 0 var(--spacing-md);
    }

    .service-card__option-item {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-sm);
      min-height: var(--touch-target-min);
      padding: var(--spacing-xs) 0;
    }

    .service-card__option-item label {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-sm);
      cursor: pointer;
      width: 100%;
      min-height: var(--touch-target-min);
      padding: var(--spacing-xs) 0;
    }

    .service-card__option-checkbox {
      accent-color: var(--color-primary);
      width: 1.25em;
      height: 1.25em;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 0.125em;
    }

    .service-card__option-checkbox:focus-visible {
      outline: 0.125em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .service-card__option-text {
      font-size: var(--font-size-sm);
      color: var(--color-text-primary);
      line-height: var(--line-height-normal);
    }

    .service-card__option-price {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      display: block;
    }

    .service-card__actions {
      display: flex;
      justify-content: center;
      margin-top: var(--spacing-md);
    }

    /* =========================================================================
       Buttons (Material-style filled buttons)
       ========================================================================= */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
      min-height: var(--touch-target-min);
      padding: 0.625em 1.5em;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: var(--font-size-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      line-height: 1;
    }

    .btn:focus-visible {
      outline: 0.1875em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .btn--primary {
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
    }

    .btn--primary:hover {
      background-color: var(--color-primary-hover);
    }

    .btn--flat {
      background-color: var(--color-background-hover);
      color: var(--color-text-primary);
    }

    .btn--flat:hover {
      background-color: var(--color-border);
    }

    .btn--confirm {
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
      min-width: 10em;
    }

    .btn--confirm:hover {
      background-color: var(--color-primary-hover);
    }

    .btn--deselect {
      background-color: var(--color-background-hover);
      color: var(--color-text-primary);
      min-width: 10em;
    }

    .btn--deselect:hover {
      background-color: var(--color-border);
    }

    label.btn {
      user-select: none;
      -webkit-user-select: none;
    }

    .material-icons {
      font-size: 1.5em;
      vertical-align: middle;
    }

    .material-icons.check-icon {
      font-size: var(--font-size-xl);
    }

    /* =========================================================================
       Summary Bar / Navigation Bar
       ========================================================================= */
    .summary-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--spacing-xl);
      padding: var(--spacing-md) 0;
    }

    /* =========================================================================
       Footer
       ========================================================================= */
    .app-footer {
      background: var(--color-background-surface);
      padding: var(--spacing-md);
      text-align: center;
      border-top: 0.0625em solid var(--color-border);
    }

    @media (min-width: 48em) {
      .app-footer {
        padding: var(--spacing-lg);
      }
    }

    .app-footer p {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: var(--font-size-xs);
    }

    /* =========================================================================
       Reduced Motion
       ========================================================================= */
    @media (prefers-reduced-motion: reduce) {
      .service-card,
      .service-card--expandable,
      .header__logo-link,
      .btn {
        transition: none;
      }
    }

    /* =========================================================================
       Accessibility: High Contrast Mode
       ========================================================================= */
    html[data-high-contrast="true"] {
      --color-text-primary: #000000;
      --color-text-secondary: #000000;
      --color-background-page: #ffffff;
      --color-border: #000000;
    }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- ===================================================================
         HEADER (matches header-container.component.html)
         =================================================================== -->
    <header class="header" role="banner">
      <div class="header__content">
        <!-- Logo & Company Name -->
        <a href="#" class="header__logo-link" aria-label="Zur Startseite">
          <div class="header__logo-container">
            <div class="header__logo-circle" aria-hidden="true">AH</div>
          </div>
          <div class="header__company">
            <span class="header__company-name">Autohaus GmbH</span>
            <span class="header__company-subtitle">Serviceauswahl</span>
          </div>
        </a>

        <!-- Spacer -->
        <div class="header__spacer"></div>

        <!-- Cart Icon with Badge -->
        <button
          class="header__icon-button"
          type="button"
          aria-label="Warenkorb: 0 Services ausgewählt">
          <span class="icon-framed icon-framed--sm" style="overflow: visible; position: relative;">
            <span class="material-icons" aria-hidden="true">shopping_cart</span>
            <span class="cart-badge" aria-hidden="true">0</span>
          </span>
        </button>

        <!-- Accessibility Button -->
        <button
          class="header__icon-button"
          type="button"
          aria-label="Barrierefreiheit-Einstellungen">
          <span class="icon-framed icon-framed--sm">
            <span class="material-icons" aria-hidden="true">accessibility_new</span>
          </span>
        </button>
      </div>
    </header>

    <!-- ===================================================================
         MAIN CONTENT
         =================================================================== -->
    <main id="main-content" class="app-main" role="main">
      <section class="service-selection" aria-labelledby="service-title">
        <h1 id="service-title" class="service-selection__title">Welche Services möchten Sie buchen?</h1>
        <p class="service-selection__subtitle">Wählen Sie die gewünschten Services aus. Klicken Sie auf eine Karte, um die Optionen einzusehen.</p>

        <div class="service-selection__grid" role="group" aria-label="Verfügbare Services">

          <!-- ===============================================================
               Card 1: Inspektion (expandable with options)
               =============================================================== -->
          <input
            type="checkbox"
            class="card-expand-toggle"
            id="expand-inspektion"
            aria-label="Inspektion Service aufklappen"
          />
          <div class="service-card service-card--expandable" role="region" aria-label="Inspektion Service">
            <span class="service-card__check material-icons check-icon" aria-hidden="true">check_circle</span>
            <label for="expand-inspektion" class="service-card__trigger">
              <div class="service-card__content">
                <span class="service-card__icon-wrapper" aria-hidden="true">
                  <img src="werkzeug-icon-freigestellt.svg" alt="Inspektion" style="width: 3em; height: 3em; object-fit: contain;">
                </span>
                <h2 class="service-card__title">Inspektion</h2>
                <p class="service-card__description">Services rund um Ihr Fahrzeug: von Inspektion über Ölwechsel bis Fahrzeugvermessung.</p>
              </div>
            </label>
            <div class="service-card__options">
              <ul class="service-card__option-list" role="group" aria-label="Inspektion Optionen">
                <li class="service-card__option-item">
                  <label>
                    <input type="checkbox" class="service-card__option-checkbox" aria-label="Dialogannahme"/>
                    <span class="service-card__option-text">Dialogannahme</span>
                  </label>
                </li>
                <li class="service-card__option-item">
                  <label>
                    <input type="checkbox" class="service-card__option-checkbox" aria-label="Inspektion"/>
                    <span class="service-card__option-text">Inspektion</span>
                  </label>
                </li>
                <li class="service-card__option-item">
                  <label>
                    <input type="checkbox" class="service-card__option-checkbox" aria-label="Ölwechsel-Service"/>
                    <span class="service-card__option-text">Ölwechsel-Service</span>
                  </label>
                </li>
                <li class="service-card__option-item">
                  <label>
                    <input type="checkbox" class="service-card__option-checkbox" aria-label="Bremsen prüfen (kostenlos) und bei Bedarf erneuern"/>
