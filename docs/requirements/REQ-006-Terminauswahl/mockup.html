<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REQ-006 Terminauswahl - Mockup</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================================================
       CSS Custom Properties - Design System (from _variables.scss)
       ========================================================================= */
    :root {
      /* Brand Colors */
      --color-primary: #667eea;
      --color-primary-hover: #5a67d8;
      --color-secondary: #764ba2;
      --color-accent: #ed8936;

      /* Text Colors (WCAG AA) */
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #595959;
      --color-text-muted: #767676;
      --color-text-on-primary: #ffffff;
      --color-text-on-dark: #ffffff;

      /* Background Colors */
      --color-background-page: #f8f9fa;
      --color-background-surface: #ffffff;
      --color-background-hover: #f5f5f5;

      /* Border & Divider */
      --color-border: #e0e0e0;
      --color-divider: #eeeeee;

      /* Semantic Colors */
      --color-error: #c62828;
      --color-success: #2e7d32;
      --color-warning: #e65100;
      --color-info: #1565c0;

      /* Focus */
      --color-focus-ring: #005fcc;

      /* Shadows */
      --shadow-small: 0 0.0625em 0.125em rgba(0, 0, 0, 0.1);
      --shadow-medium: 0 0.25em 0.5em rgba(0, 0, 0, 0.1);
      --shadow-large: 0 0.5em 1em rgba(0, 0, 0, 0.15);

      /* Typography */
      --font-size-base: 1em;
      --font-size-xs: 0.875em;
      --font-size-sm: 1em;
      --font-size-md: 1.125em;
      --font-size-lg: 1.25em;
      --font-size-xl: 1.5em;
      --font-size-2xl: 2em;

      --line-height-tight: 1.25;
      --line-height-normal: 1.5;
      --line-height-relaxed: 1.75;

      /* Spacing */
      --spacing-xs: 0.25em;
      --spacing-sm: 0.5em;
      --spacing-md: 1em;
      --spacing-lg: 1.5em;
      --spacing-xl: 2em;

      /* Border Radius */
      --radius-sm: 0.25em;
      --radius-md: 0.5em;
      --radius-lg: 0.75em;
      --radius-xl: 1em;
      --radius-full: 50%;

      /* Touch Targets */
      --touch-target-min: 2.75em;
    }

    /* =========================================================================
       Reset & Base
       ========================================================================= */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: var(--line-height-normal);
      color: var(--color-text-primary);
      background-color: var(--color-background-page);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =========================================================================
       App Layout
       ========================================================================= */
    .app-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--color-background-page);
    }

    .app-main {
      flex: 1;
      padding: var(--spacing-md);
      width: 100%;
      max-width: 80em;
      margin: 0 auto;
    }

    @media (min-width: 48em) {
      .app-main {
        padding: var(--spacing-xl);
      }
    }

    /* =========================================================================
       Icon Framed (from _utilities.scss)
       ========================================================================= */
    .icon-framed {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5em;
      height: 2.5em;
      background: var(--color-background-surface);
      border: 0.0625em solid var(--color-border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-small);
    }

    .icon-framed--sm {
      width: 2em;
      height: 2em;
    }

    .icon-framed--primary {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* =========================================================================
       Header (from header-container.component.scss)
       ========================================================================= */
    .header {
      background-color: var(--color-background-surface);
      border-bottom: 0.0625em solid var(--color-border);
      box-shadow: var(--shadow-small);
    }

    .header__content {
      display: flex;
      align-items: center;
      padding: var(--spacing-sm) var(--spacing-md);
      max-width: 80em;
      margin: 0 auto;
      min-height: 3.5em;
    }

    .header__logo-link {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      text-decoration: none;
      color: inherit;
      min-height: var(--touch-target-min);
      padding: var(--spacing-xs);
      border-radius: var(--radius-sm);
      transition: background-color 0.2s ease;
    }

    .header__logo-link:hover {
      background-color: var(--color-background-hover);
    }

    .header__logo-link:focus-visible {
      outline: 0.125em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .header__logo-circle {
      width: 2.5em;
      height: 2.5em;
      border-radius: var(--radius-full);
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--font-size-sm);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .header__company {
      display: flex;
      flex-direction: column;
      line-height: var(--line-height-tight);
    }

    .header__company-name {
      font-size: var(--font-size-md);
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .header__company-subtitle {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
    }

    .header__spacer {
      flex: 1;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .header__icon-button {
      background: none;
      border: none;
      cursor: pointer;
      min-width: var(--touch-target-min);
      min-height: var(--touch-target-min);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      position: relative;
      padding: 0;
      color: var(--color-text-primary);
    }

    .header__icon-button:hover {
      background-color: var(--color-background-hover);
    }

    .header__icon-button:focus-visible {
      outline: 0.125em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    /* Header responsive */
    @media (max-width: 47.9375em) {
      .header__company {
        display: none;
      }
      .header__content {
        padding: var(--spacing-xs) var(--spacing-sm);
      }
    }

    @media (min-width: 48em) and (max-width: 63.9375em) {
      .header__company-subtitle {
        display: none;
      }
    }

    @media (min-width: 64em) {
      .header__content {
        padding: var(--spacing-md) var(--spacing-lg);
      }
      .header__logo-circle {
        width: 3em;
        height: 3em;
        font-size: var(--font-size-md);
      }
    }

    /* =========================================================================
       Appointment Selection Layout
       ========================================================================= */
    .appointment-selection {
      max-width: 70em;
      margin: 0 auto;
      padding: var(--spacing-xl) var(--spacing-md);
      text-align: center;
    }

    .appointment-selection__title {
      font-size: var(--font-size-xl);
      line-height: var(--line-height-tight);
      color: var(--color-text-primary);
      margin: 0 0 var(--spacing-xl);
      font-weight: 700;
    }

    @media (min-width: 48em) {
      .appointment-selection__title {
        font-size: var(--font-size-2xl);
      }
    }

    /* =========================================================================
       Appointment Cards Grid
       ========================================================================= */
    .appointment-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }

    @media (min-width: 48em) {
      .appointment-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--spacing-lg);
      }
    }

    @media (min-width: 64em) {
      .appointment-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* =========================================================================
       CSS-Only Card Selection via Hidden Radio Inputs
       Structure:
         <input type="radio" class="appt-radio" id="appt-X" name="appointment">
         <label class="appointment-card" for="appt-X">
           ...card content...
         </label>
       ========================================================================= */
    .appt-radio {
      /* Visually hidden but accessible */
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Appointment Card (label) */
    .appointment-card {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      background-color: var(--color-background-surface);
      border: 0.125em solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md) var(--spacing-lg);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
      text-align: left;
      min-height: var(--touch-target-min);
    }

    .appointment-card:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-medium);
    }

    .appointment-card:focus-visible {
      outline: 0.1875em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    /* Selected state via :checked sibling */
    .appt-radio:checked + .appointment-card {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 0.0625em var(--color-primary), var(--shadow-medium);
      background-color: #f0f2ff;
    }

    .appt-radio:checked + .appointment-card .appointment-card__day {
      background-color: var(--color-primary-hover);
      transform: scale(1.05);
    }

    /* Focus on radio → style label */
    .appt-radio:focus-visible + .appointment-card {
      outline: 0.1875em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    /* =========================================================================
       Appointment Card Inner Elements
       ========================================================================= */
    .appointment-card__day {
      width: 3.5em;
      height: 3.5em;
      min-width: 3.5em;
      border-radius: var(--radius-full);
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--font-size-lg);
      letter-spacing: 0.02em;
      transition: background-color 0.2s, transform 0.15s;
    }

    .appointment-card__info {
      display: flex;
      flex-direction: column;
      gap: 0.125em;
    }

    .appointment-card__date {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-primary);
      line-height: var(--line-height-tight);
    }

    .appointment-card__time {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: var(--line-height-tight);
    }

    /* Desktop: stack day above info */
    @media (min-width: 64em) {
      .appointment-card {
        flex-direction: column;
        text-align: center;
        padding: var(--spacing-lg);
        justify-content: center;
        gap: var(--spacing-sm);
      }

      .appointment-card__info {
        align-items: center;
      }
    }

    /* =========================================================================
       Calendar Link
       ========================================================================= */
    .appointment-selection__calendar-link {
      display: inline-block;
      margin-top: var(--spacing-lg);
      font-size: var(--font-size-sm);
      color: var(--color-text-primary);
      text-decoration: underline;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      padding: var(--spacing-xs);
      border-radius: var(--radius-sm);
      transition: color 0.2s;
    }

    .appointment-selection__calendar-link:hover {
      color: var(--color-primary);
    }

    .appointment-selection__calendar-link:focus-visible {
      outline: 0.125em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    /* =========================================================================
       Buttons
       ========================================================================= */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-xs);
      min-height: var(--touch-target-min);
      padding: 0.625em 1.5em;
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: var(--font-size-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      line-height: 1;
    }

    .btn:focus-visible {
      outline: 0.1875em solid var(--color-focus-ring);
      outline-offset: 0.125em;
    }

    .btn--primary {
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
    }

    .btn--primary:hover {
      background-color: var(--color-primary-hover);
    }

    .btn--flat {
      background-color: var(--color-background-hover);
      color: var(--color-text-primary);
    }

    .btn--flat:hover {
      background-color: var(--color-border);
    }

    .material-icons {
      font-size: 1.5em;
      vertical-align: middle;
    }

    /* =========================================================================
       Navigation Bar (Zurück / Weiter)
       ========================================================================= */
    .wizard-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--spacing-xl);
      padding: var(--spacing-md) 0;
      border-top: 0.0625em solid var(--color-divider);
    }

    /* =========================================================================
       Footer
       ========================================================================= */
    .app-footer {
      background: var(--color-background-surface);
      padding: var(--spacing-md);
      text-align: center;
      border-top: 0.0625em solid var(--color-border);
    }

    @media (min-width: 48em) {
      .app-footer {
        padding: var(--spacing-lg);
      }
    }

    .app-footer p {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

  </style>
</head>
<body>
  <div class="app-layout">

    <!-- =======================================================================
         HEADER (matches header-container.component.html)
         ======================================================================= -->
    <header class="header" role="banner">
      <div class="header__content">
        <!-- Logo + Company Name -->
        <a href="#main-content" class="header__logo-link" aria-label="Gottfried Schultz - Zur Startseite">
          <div class="header__logo-circle" aria-hidden="true">GS</div>
          <div class="header__company">
            <span class="header__company-name">Gottfried Schultz</span>
            <span class="header__company-subtitle">Automobilhandels SE</span>
          </div>
        </a>

        <div class="header__spacer"></div>

        <!-- Header Actions -->
        <div class="header__actions">
          <!-- Cart Icon -->
          <button
            class="header__icon-button"
            type="button"
            aria-label="Warenkorb öffnen"
          >
            <span class="icon-framed icon-framed--sm" aria-hidden="true">
              <span class="material-icons">shopping_cart</span>
            </span>
          </button>

          <!-- Accessibility Icon -->
          <button
            class="header__icon-button"
            type="button"
            aria-label="Barrierefreiheit Einstellungen"
          >
            <span class="icon-framed icon-framed--sm" aria-hidden="true">
              <span class="material-icons">accessibility_new</span>
            </span>
          </button>
        </div>
      </div>
    </header>

    <!-- =======================================================================
         MAIN CONTENT
         ======================================================================= -->
    <main class="app-main" id="main-content" tabindex="-1">
      <section
        class="appointment-selection"
        aria-labelledby="appointment-title"
      >

        <!-- Title -->
        <h1 class="appointment-selection__title" id="appointment-title">
          Wählen Sie den für Sie passenden Tag und Uhrzeit aus
        </h1>

        <!-- Appointment Cards (CSS-Only Single-Select via radio inputs) -->
        <div
          class="appointment-grid"
          role="radiogroup"
          aria-label="Terminvorschläge"
        >

          <!-- ================================================================
               Termin 1: Di, 24.02.2026, 09:00 Uhr
               ================================================================ -->
          <input
            type="radio"
            class="appt-radio"
            id="appt-1"
            name="appointment"
            aria-label="Dienstag, 24.02.2026, 09:00 Uhr"
          />
          <label
            class="appointment-card"
            for="appt-1"
            tabindex="0"
          >
            <div class="appointment-card__day" aria-hidden="true">Di</div>
            <div class="appointment-card__info">
              <span class="appointment-card__date">24.02.2026</span>
              <span class="appointment-card__time">09:00 Uhr</span>
            </div>
          </label>

          <!-- ================================================================
               Termin 2: Mi, 25.02.2026, 14:00 Uhr
               ================================================================ -->
          <input
            type="radio"
            class="appt-radio"
            id="appt-2"
            name="appointment"
            aria-label="Mittwoch, 25.02.2026, 14:00 Uhr"
          />
          <label
            class="appointment-card"
            for="appt-2"
            tabindex="0"
          >
            <div class="appointment-card__day" aria-hidden="true">Mi</div>
            <div class="appointment-card__info">
              <span class="appointment-card__date">25.02.2026</span>
              <span class="appointment-card__time">14:00 Uhr</span>
            </div>
          </label>

          <!-- ================================================================
               Termin 3: Do, 26.02.2026, 11:00 Uhr
               ================================================================ -->
          <input
            type="radio"
            class="appt-radio"
            id="appt-3"
            name="appointment"
            aria-label="Donnerstag, 26.02.2026, 11:00 Uhr"
          />
          <label
            class="appointment-card"
            for="appt-3"
            tabindex="0"
          >
            <div class="appointment-card__day" aria-hidden="true">Do</div>
            <div class="appointment-card__info">
              <span class="appointment-card__date">26.02.2026</span>
              <span class="appointment-card__time">11:00 Uhr</span>
            </div>
          </label>

          <!-- ================================================================
               Termin 4: Fr, 27.02.2026, 16:00 Uhr
               ================================================================ -->
          <input
            type="radio"
            class="appt-radio"
            id="appt-4"
            name="appointment"
            aria-label="Freitag, 27.02.2026, 16:00 Uhr"
          />
          <label
            class="appointment-card"
            for="appt-4"
            tabindex="0"
          >
            <div class="appointment-card__day" aria-hidden="true">Fr</div>
            <div class="appointment-card__info">
              <span class="appointment-card__date">27.02.2026</span>
              <span class="appointment-card__time">16:00 Uhr</span>
            </div>
          </label>

        </div><!-- /.appointment-grid -->

        <!-- Calendar Link -->
        <button
          class="appointment-selection__calendar-link"
          type="button"
          aria-label="Weitere freie Termine im Werkstattkalender anzeigen"
          onclick="return false;"
        >
          Hier sehen Sie weitere freie Termine in unserem Werkstattkalender
        </button>

        <!-- ================================================================
             Navigation Bar: Zurück / Weiter
             ================================================================ -->
        <nav class="wizard-nav" aria-label="Seitennavigation">
          <button
            class="btn btn--flat"
            type="button"
            aria-label="Zurück zur Notizseite"
          >
            <span class="material-icons" aria-hidden="true">arrow_back</span>
            Zurück
          </button>

          <button
            class="btn btn--primary"
            type="button"
            aria-label="Weiter zum nächsten Schritt"
          >
            Weiter
            <span class="material-icons" aria-hidden="true">arrow_forward</span>
          </button>
        </nav>

      </section>
    </main>

    <!-- =======================================================================
         FOOTER
         ======================================================================= -->
    <footer class="app-footer" role="contentinfo">
      <p>Gottfried Schultz Automobilhandels SE</p>
    </footer>

  </div>
</body>
</html>
