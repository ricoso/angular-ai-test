<div class="brand-grid" role="radiogroup" [attr.aria-label]="booking.brand.ariaGroupLabel | translate">
  @for (brand of enrichedBrands(); track brand.id) {
    <div class="brand-grid__item">
      <input
        type="radio"
        name="brand"
        [id]="'brand-' + brand.id"
        class="brand-grid__radio"
        [value]="brand.id"
        [checked]="brand.id === selectedBrand()"
        [attr.aria-label]="brand.name"
        (change)="onSelect(brand)"
      />
      <label [for]="'brand-' + brand.id" class="brand-card">
        <span class="brand-card__check" aria-hidden="true">
          <mat-icon>check</mat-icon>
        </span>
        @if (brand.logoPath) {
          <img
            [src]="brand.logoPath"
            [alt]="brand.name"
            class="brand-card__logo"
            aria-hidden="true"
          />
        }
        <span class="brand-card__name">{{ brand.name }}</span>
      </label>
    </div>
  }
</div>
