<app-wizard-breadcrumb [steps]="wizardSteps" [activeIndex]="activeStepIndex" />

<section class="location-selection">
  <h1 class="location-selection__title">{{ booking.location.title | translate }}</h1>
  <p class="location-selection__subtitle">{{ booking.location.subtitle | translate }}</p>

  <app-location-cards
    [branches]="branches()"
    [selectedBranch]="selectedBranch()"
    (branchSelected)="onBranchSelect($event)"
  />

  <!-- Auto-Navigation: Klick auf Standort-Card navigiert direkt weiter -->
</section>
