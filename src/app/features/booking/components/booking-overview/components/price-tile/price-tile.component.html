<article class="summary-card price-tile" aria-labelledby="tile-title-price">
  <div class="summary-card__header">
    <span class="summary-card__icon icon-framed icon-framed--sm icon-framed--primary" aria-hidden="true">
      <span class="material-icons">euro</span>
    </span>
    <h2 class="summary-card__title" id="tile-title-price">
      {{ bookingOverview.tiles.price.title | translate }}
    </h2>
  </div>
  <div class="price-tile__amount" aria-label="price">
    {{ totalPriceGross() }}
  </div>
  <p class="price-tile__tax">
    {{ bookingOverview.tiles.price.vatIncluded | translate }}
  </p>
</article>
